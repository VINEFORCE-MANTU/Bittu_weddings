<section class="w-full min-h-screen bg-[#f9f7f5] px-6 md:px-16 py-20">

  <!-- TOP BAR -->
  <div class="flex items-center justify-between mb-12 fade-up">
    <button (click)="goBack()"
      class="group flex items-center gap-2 text-[#8c8c8c] 
             hover:text-[#c8a2a2] transition text-sm tracking-wide">
      <span class="transform group-hover:-translate-x-1 transition">←</span>
      <span class="border-b border-transparent group-hover:border-[#c8a2a2]">
        Back
      </span>
    </button>
  </div>

  <!-- Heading -->
  <div class="text-center mb-16 fade-up">
    <h2 class="text-3xl md:text-5xl font-serif text-[#4a4a4a]">
      Our Wedding Gallery
    </h2>
    <div class="w-10 h-[2px] bg-[#c8a2a2] mx-auto mt-5"></div>
    <p class="text-gray-500 mt-5 text-sm tracking-[2px]">
      Capturing timeless moments
    </p>
  </div>

  <!-- FILTER -->
  <div class="flex flex-wrap justify-center gap-3 mb-16 fade-up">

    <button (click)="filter='all'"
      [ngClass]="filter==='all' ? activeClass : normalClass">
      All
    </button>

    <button (click)="filter='haldi'"
      [ngClass]="filter==='haldi' ? activeClass : normalClass">
      Haldi
    </button>

    <button (click)="filter='mehendi'"
      [ngClass]="filter==='mehendi' ? activeClass : normalClass">
      Mehendi
    </button>

    <button (click)="filter='wedding'"
      [ngClass]="filter==='wedding' ? activeClass : normalClass">
      Wedding
    </button>

    <!-- ✅ NEW -->
    <button (click)="filter='family'"
      [ngClass]="filter==='family' ? activeClass : normalClass">
      Family
    </button>

  </div>

  <!-- GRID -->
<div class="columns-1 sm:columns-2 md:columns-3 gap-8 space-y-8">

  <!-- CARD -->
  <div *ngFor="let img of filteredImages"
    class="relative group break-inside-avoid overflow-hidden rounded-3xl shadow-sm hover:shadow-xl transition duration-500">

    <!-- IMAGE -->
    <img [src]="img.src"
      class="w-full object-cover transition duration-700 
             md:group-hover:scale-110" />

    <!-- ✅ OVERLAY (VISIBLE ON MOBILE, HOVER ON DESKTOP) -->
    <div class="absolute inset-0 
                bg-gradient-to-t from-black/60 via-black/20 to-transparent 
                opacity-100 md:opacity-0 
                md:group-hover:opacity-100 
                transition duration-500">
    </div>

    <!-- ✅ TEXT (VISIBLE ON MOBILE, ANIMATED ON DESKTOP) -->
    <div class="absolute bottom-5 left-5 
                opacity-100 translate-y-0
                md:opacity-0 md:translate-y-4 
                md:group-hover:translate-y-0 
                md:group-hover:opacity-100 
                transition duration-500">

      <p class="text-white text-[10px] tracking-[4px] uppercase opacity-80">
        {{ img.category }}
      </p>

      <h3 class="text-white text-xl font-serif mt-1">
        {{ img.title }}
      </h3>

    </div>

  </div>

</div>

</section>
