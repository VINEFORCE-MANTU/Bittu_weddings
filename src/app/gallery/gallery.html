<section class="w-full min-h-screen bg-[#f9f7f5] px-6 md:px-16 py-20">

  <!-- TOP BAR -->
  <div class="flex items-center justify-between mb-12 fade-up">

    <button (click)="goBack()"
      class="group flex items-center gap-2 text-[#8c8c8c] 
             hover:text-[#c8a2a2] transition text-sm tracking-wide">

      <span class="transform group-hover:-translate-x-1 transition">←</span>
      <span class="border-b border-transparent group-hover:border-[#c8a2a2]">
        Back
      </span>

    </button>

  </div>

  <!-- Heading -->
  <div class="text-center mb-16 fade-up">
    <h2 class="text-3xl md:text-5xl font-serif text-[#4a4a4a] leading-tight">
      Our Wedding Gallery
    </h2>

    <div class="w-10 h-[2px] bg-[#c8a2a2] mx-auto mt-5"></div>

    <p class="text-gray-500 mt-5 text-sm tracking-[2px]">
      Capturing timeless moments
    </p>
  </div>

  <!-- FILTER -->
  <div class="flex flex-wrap justify-center gap-3 mb-16 fade-up">

    <button (click)="filter='all'"
      [ngClass]="filter==='all' ? 'bg-[#c8a2a2] text-white shadow-md' : 'text-[#8c8c8c]'"
      class="px-6 py-2 border rounded-full text-sm tracking-wide transition">
      All
    </button>

    <button (click)="filter='haldi'"
      [ngClass]="filter==='haldi' ? 'bg-[#c8a2a2] text-white shadow-md' : 'text-[#8c8c8c]'"
      class="px-6 py-2 border rounded-full text-sm tracking-wide transition">
      Haldi
    </button>

    <button (click)="filter='mehendi'"
      [ngClass]="filter==='mehendi' ? 'bg-[#c8a2a2] text-white shadow-md' : 'text-[#8c8c8c]'"
      class="px-6 py-2 border rounded-full text-sm tracking-wide transition">
      Mehendi
    </button>

    <button (click)="filter='wedding'"
      [ngClass]="filter==='wedding' ? 'bg-[#c8a2a2] text-white shadow-md' : 'text-[#8c8c8c]'"
      class="px-6 py-2 border rounded-full text-sm tracking-wide transition">
      Wedding
    </button>

  </div>

  <!-- GRID -->
  <div class="columns-1 sm:columns-2 md:columns-3 gap-8 space-y-8">

    <!-- CARD -->
    <div class="relative group break-inside-avoid overflow-hidden rounded-3xl shadow-sm hover:shadow-xl transition duration-500">

      <img src="assets/Bittu.png"
        class="w-full object-cover transition duration-700 
               group-hover:scale-110" />

      <!-- Soft overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-black/10 to-transparent 
                  opacity-0 group-hover:opacity-100 transition duration-500"></div>

      <!-- Text -->
      <div class="absolute bottom-5 left-5 translate-y-4 opacity-0 
                  group-hover:translate-y-0 group-hover:opacity-100 
                  transition duration-500">

        <p class="text-white text-[10px] tracking-[4px] uppercase opacity-80">
          Haldi
        </p>

        <h3 class="text-white text-xl font-serif mt-1">
          Ceremony Moments
        </h3>

      </div>

    </div>

    <!-- CARD -->
    <div class="relative group break-inside-avoid overflow-hidden rounded-3xl shadow-sm hover:shadow-xl transition duration-500">

      <img src="assets/Bittu.png"
        class="w-full object-cover transition duration-700 
               group-hover:scale-110" />

      <div class="absolute inset-0 bg-gradient-to-t from-black/50 via-black/10 to-transparent 
                  opacity-0 group-hover:opacity-100 transition duration-500"></div>

      <div class="absolute bottom-5 left-5 translate-y-4 opacity-0 
                  group-hover:translate-y-0 group-hover:opacity-100 
                  transition duration-500">

        <p class="text-white text-[10px] tracking-[4px] uppercase opacity-80">
          Mehendi
        </p>

        <h3 class="text-white text-xl font-serif mt-1">
          Beautiful Hands
        </h3>

      </div>

    </div>

   <div class="relative group break-inside-avoid overflow-hidden rounded-[28px] 
            bg-white/40 backdrop-blur-md 
            shadow-[0_8px_30px_rgba(0,0,0,0.08)] 
            hover:shadow-[0_12px_40px_rgba(0,0,0,0.15)] 
            transition duration-500">

  <!-- IMAGE -->
  <div class="overflow-hidden">
    <img src="assets/bride.png"
      class="w-full object-cover transition duration-700 
             group-hover:scale-105 group-hover:brightness-75" />
  </div>

  <!-- SOFT GRADIENT OVERLAY -->
  <div class="absolute inset-0 
              bg-gradient-to-t from-black/40 via-black/10 to-transparent 
              opacity-0 group-hover:opacity-100 
              transition duration-500"></div>

  <!-- CONTENT -->
  <div class="absolute bottom-0 left-0 w-full p-5">

    <div class="transform translate-y-6 opacity-0 
                group-hover:translate-y-0 group-hover:opacity-100 
                transition duration-500 ease-out">

      <p class="text-white text-[11px] tracking-[5px] uppercase opacity-80">
        Wedding
      </p>

      <h3 class="text-white text-xl font-serif mt-1">
        Sacred Rituals
      </h3>

    </div>

  </div>

  <!-- LIGHT REFLECTION EFFECT -->
  <div class="absolute inset-0 opacity-0 group-hover:opacity-100 transition duration-700 pointer-events-none">
    <div class="absolute -top-1/2 -left-1/2 w-[200%] h-[200%] 
                bg-gradient-to-tr from-transparent via-white/10 to-transparent 
                rotate-12 group-hover:translate-x-1/2 transition duration-1000"></div>
  </div>

</div>

  </div>

</section>
