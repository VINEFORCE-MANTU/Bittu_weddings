<div id="family" class="min-h-screen  bg-[#f9f7f5] py-24 px-6">

  <!-- Title -->
  <div class="text-center mb-20 fade-up">
    <p class="text-xs tracking-[4px] text-gray-400">OUR FAMILY</p>

    <h2 class="text-4xl md:text-5xl font-serif text-gray-800 mt-3 tracking-wide">
      Family Members
    </h2>

    <div class="w-12 h-[1px] bg-[#c8a2a2] mx-auto mt-5"></div>
  </div>
 <!-- 🤵 Groom Family -->
  <div>
    <h3 class="text-center text-2xl font-serif text-gray-700 mb-12 fade-up">
      Groom's Family
    </h3>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-12 max-w-6xl mx-auto">

      <div *ngFor="let member of groomFamily; let i = index"
           (click)="openPreview(member)"
           class="text-center cursor-pointer group fade-up"
           [style.transitionDelay]="i * 120 + 'ms'">

        <div class="relative mx-auto w-32 h-32 md:w-36 md:h-36 rounded-full overflow-hidden">

          <img [src]="member.image"
               class="w-full h-full object-cover object-top 
                      border border-gray-300 shadow-sm
                      transition duration-500 group-hover:scale-105 group-hover:shadow-lg">

          <div class="absolute inset-0 rounded-full border border-[#c8a2a2]/30 
                      opacity-0 group-hover:opacity-100 transition duration-300"></div>
        </div>

        <h3 class="mt-5 text-lg font-serif text-gray-800 tracking-wide">
          {{member.name}}
        </h3>

        <p class="text-xs text-gray-500 tracking-[2px] uppercase mt-1">
          {{member.role}}
        </p>

      </div>

    </div>
  </div>
  <!-- 👰 Bride Family -->
  <div class="mb-20">
    <h3 class="text-center text-2xl font-serif text-gray-700 mb-12 fade-up">
      Bride's Family
    </h3>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-12 max-w-6xl mx-auto">

      <div *ngFor="let member of brideFamily; let i = index"
           (click)="openPreview(member)"
           class="text-center cursor-pointer group fade-up"
           [style.transitionDelay]="i * 120 + 'ms'">

        <!-- Image -->
        <div class="relative mx-auto w-32 h-32 md:w-36 md:h-36 rounded-full overflow-hidden">

          <img [src]="member.image"
               class="w-full h-full object-cover object-top 
                      border border-gray-300 shadow-sm
                      transition duration-500 group-hover:scale-105 group-hover:shadow-lg">

          <div class="absolute inset-0 rounded-full border border-[#c8a2a2]/30 
                      opacity-0 group-hover:opacity-100 transition duration-300"></div>
        </div>

        <!-- Text -->
        <h3 class="mt-5 text-lg font-serif text-gray-800 tracking-wide">
          {{member.name}}
        </h3>

        <p class="text-xs text-gray-500 tracking-[2px] uppercase mt-1">
          {{member.role}}
        </p>

      </div>

    </div>
  </div>

 

</div>
<div *ngIf="selectedMember"
     class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center">

  <!-- Close -->
  <button (click)="closePreview()"
          class="absolute top-6 right-8 text-white text-4xl hover:scale-110 transition">
    ✕
  </button>

  <!-- Content -->
  <div class="max-w-3xl w-full px-4 text-center animate-zoomIn">

    <img [src]="selectedMember.image"
         class="w-full max-h-[80vh] object-contain rounded-xl shadow-2xl">

    <div class="mt-6 text-white">
      <h3 class="text-2xl font-serif tracking-wide">
        {{selectedMember.name}}
      </h3>

      <p class="text-sm opacity-80 mt-2 tracking-[2px] uppercase">
        {{selectedMember.role}}
      </p>
    </div>

  </div>

</div>
