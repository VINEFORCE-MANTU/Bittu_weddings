<div id="family" class="min-h-screen bg-[#f9f7f5]  py-20 px-6">

  <!-- Back -->
  <div class="mb-8">
    <button routerLink="/" 
            class="text-sm text-gray-500 tracking-wide hover:text-black transition">
      ← BACK
    </button>
  </div>

  <!-- Title -->
  <div class="text-center mb-16">
    <p class="text-xs tracking-[3px] text-gray-400">OUR FAMILY</p>
    <h2 class="text-4xl md:text-5xl font-serif text-gray-800 mt-2">
      Family Members
    </h2>
  </div>

  <!-- 👰 Bride Family -->
  <div class="mb-16">
    <h3 class="text-center text-2xl font-serif text-gray-700 mb-8">
      Bride Family
    </h3>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10 max-w-6xl mx-auto">

      <div *ngFor="let member of brideFamily"
           (click)="openPreview(member)"
           class="text-center cursor-pointer group">

        <div class="relative mx-auto w-32 h-32">
          <img [src]="member.image"
               class="w-full h-full object-cover rounded-full border border-gray-300 shadow-sm
                      transition duration-300 group-hover:scale-105">

          <div class="absolute inset-0 rounded-full border border-black/20 
                      opacity-0 group-hover:opacity-100 transition"></div>
        </div>

        <h3 class="mt-4 text-lg font-serif text-gray-800">
          {{member.name}}
        </h3>

        <p class="text-xs text-gray-500 tracking-[2px] uppercase mt-1">
          {{member.role}}
        </p>

      </div>

    </div>
  </div>

  <!-- 🤵 Groom Family -->
  <div>
    <h3 class="text-center text-2xl font-serif text-gray-700 mb-8">
      Groom Family
    </h3>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10 max-w-6xl mx-auto">

      <div *ngFor="let member of groomFamily"
           (click)="openPreview(member)"
           class="text-center cursor-pointer group">

        <div class="relative mx-auto w-32 h-32">
          <img [src]="member.image"
               class="w-full h-full object-cover rounded-full border border-gray-300 shadow-sm
                      transition duration-300 group-hover:scale-105">

          <div class="absolute inset-0 rounded-full border border-black/20 
                      opacity-0 group-hover:opacity-100 transition"></div>
        </div>

        <h3 class="mt-4 text-lg font-serif text-gray-800">
          {{member.name}}
        </h3>

        <p class="text-xs text-gray-500 tracking-[2px] uppercase mt-1">
          {{member.role}}
        </p>

      </div>

    </div>
  </div>

</div>

<!-- Modal -->
<div *ngIf="selectedMember"
     class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center">

  <button (click)="closePreview()"
          class="absolute top-6 right-8 text-white text-3xl">
    ✕
  </button>

  <div class="bg-white p-6 rounded-2xl shadow-xl text-center max-w-sm">

    <img [src]="selectedMember.image"
         class="w-40 h-40 object-cover rounded-full mx-auto border border-gray-300">

    <h3 class="mt-4 text-xl font-serif text-gray-800">
      {{selectedMember.name}}
    </h3>

    <p class="text-sm text-gray-500 mt-1">
      {{selectedMember.role}}
    </p>

  </div>

</div>
